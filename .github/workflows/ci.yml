name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate plugin manifests
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          root = Path.cwd()
          plugin = json.loads((root / ".codex-plugin" / "plugin.json").read_text(encoding="utf-8"))
          app = json.loads((root / ".app.json").read_text(encoding="utf-8"))
          mcp = json.loads((root / ".mcp.json").read_text(encoding="utf-8"))

          semver = re.compile(
              r"^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)"
              r"(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?"
              r"(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$"
          )
          assert plugin["name"] == "codex-master"
          assert semver.fullmatch(plugin["version"])
          assert plugin["skills"] == "./skills/"
          assert plugin["mcpServers"] == "./.mcp.json"
          assert plugin["apps"] == "./.app.json"

          app_entry = app["apps"]["codex-master"]
          assert app_entry["id"].startswith(("connector_", "asdk_app_"))

          server = mcp["mcpServers"]["codex-master-mcp"]
          assert server["command"] == "python3"
          assert "codex_master.server" in " ".join(server["args"])
          assert server["startup_timeout_sec"] >= 120
          PY

      - name: Check committed whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -eu
          zero_sha=0000000000000000000000000000000000000000
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${BASE_SHA}" ]; then
            range="${BASE_SHA}...${HEAD_SHA}"
          elif [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "${zero_sha}" ]; then
            range="${BEFORE_SHA}..${HEAD_SHA}"
          else
            for commit_sha in $(git rev-list --reverse "${HEAD_SHA}"); do
              git diff-tree --check --root --no-commit-id -r "${commit_sha}"
            done
            exit 0
          fi
          git diff --check "${range}"

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Check CLI wrapper
        run: ./bin/codex-master-mcp tools
